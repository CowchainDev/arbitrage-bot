        symbol:
          type: string
        bybitOrderId:
          type: string
        binanceOrderId:
          type: string
        bybitQty:
          type: number
        binanceQty:
          type: number
        bybitEntry:
          type: number
        binanceEntry:
          type: number
        bybitSide:
          type: string
          enum: [long, short]
        binanceSide:
