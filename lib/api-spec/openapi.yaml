          type: string
          description: Token symbol e.g. BTC
        enterSpreadPct:
          type: number
          description: Minimum spread % to open a new leg
        closeSpreadPct:
          type: number
          description: Spread % at which open legs are closed (take profit)
        stopLossSpreadPct:
          type: number
          description: Spread % at which a widening position is closed (stop loss, 0 = disabled)
        orderSizeUsd:
          type: number
          description: Total USD size per leg
        maxOrders:
          type: number
          description: Maximum concurrent open legs
        forceStopUsd:
          type: number
