openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: exchanges
    description: Exchange data and trading operations
  - name: trades
    description: Trade history operations
  - name: credentials
    description: Server-side credential storage for bot automation
  - name: bots
    description: Automated arbitrage bot configuration and control
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /exchanges/prices:
    get:
      operationId: getExchangePrices
      tags: [exchanges]
      summary: Get price spread data for all tracked tokens
      description: Returns live price data from both Bybit and Binance futures markets with calculated spread
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Price spread data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenSpread"

  /exchanges/balances:
    get:
      operationId: getExchangeBalances
      tags: [exchanges]
      summary: Get futures wallet balances for both exchanges
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: true
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: true
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: true
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Wallet balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeBalances"
        "401":
          description: Invalid API credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /exchanges/order:
    post:
      operationId: placeOrder
      tags: [exchanges]
      summary: Place a futures order on a specific exchange
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "200":
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Invalid API credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /positions:
    get:
      operationId: getPositions
      tags: [exchanges]
      summary: Get all open positions with live P&L
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Open positions with P&L
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /exchanges/jump-in:
    post:
      operationId: jumpIn
      tags: [exchanges]
      summary: Atomically open a long on one exchange and short on the other
      description: Places hedge orders on both exchanges. If the second leg fails, the first is immediately closed as compensation.
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JumpInRequest"
      responses:
        "200":
          description: Both legs placed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JumpInResult"
        "400":
          description: Bad request or partial failure with compensation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JumpInResult"
        "401":
          description: Invalid API credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /exchanges/close-position:
    post:
      operationId: closePosition
      tags: [exchanges]
      summary: Close both sides of an arbitrage position
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClosePositionRequest"
      responses:
        "200":
          description: Position closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClosePositionResult"

  /bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List all bot configurations
      responses:
        "200":
          description: Bot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotListResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createBot
      tags: [bots]
      summary: Create a new bot configuration
      parameters:
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotRequest"
      responses:
        "200":
          description: Bot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}:
    put:
      operationId: updateBot
      tags: [bots]
      summary: Update a bot configuration
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotRequest"
      responses:
        "200":
          description: Bot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteBot
      tags: [bots]
      summary: Delete a bot configuration and all its legs
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      responses:
        "200":
          description: Bot deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBotResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/start:
    post:
      operationId: startBot
      tags: [bots]
      summary: Enable a bot (start watching for entry conditions)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/stop:
    post:
      operationId: stopBot
      tags: [bots]
      summary: Disable a bot (stop opening new legs, existing legs still close)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/stop-and-close:
    post:
      operationId: stopAndCloseBot
      tags: [bots]
      summary: Stop a bot and immediately close all its open legs at market price
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      responses:
        "200":
          description: Bot stopped and positions closed
          content:
            application/json:
              schema:
                type: object
                required: [bot, closed, failed]
                properties:
                  bot:
                    $ref: "#/components/schemas/BotConfig"
                  closed:
                    type: integer
                    description: Number of legs successfully closed
                  failed:
                    type: integer
                    description: Number of legs that failed to close
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/legs:
    get:
      operationId: getBotLegs
      tags: [bots]
      summary: Get all open legs for a bot
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Open legs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotLegsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /credentials:
    post:
      operationId: storeCredential
      tags: [credentials]
      summary: Store or update API credentials for an exchange server-side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreCredentialRequest"
      responses:
        "200":
          description: Credential stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreCredentialResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      operationId: getCredentialStatus
      tags: [credentials]
      summary: Get which exchanges have credentials stored server-side (no secrets returned)
      responses:
        "200":
          description: Credential status list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialStatusResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: Get trade history with aggregate stats
      responses:
        "200":
          description: Trade history and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeHistoryResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    TokenSpread:
      type: object
      properties:
        symbol:
          type: string
          description: Token symbol e.g. BTC, ETH
        bybitPrice:
          type: number
          nullable: true
          description: Last price on Bybit futures (null if token not listed)
        binancePrice:
          type: number
          nullable: true
          description: Last price on Binance futures (null if token not listed)
        spreadPct:
          type: number
          description: Price spread percentage (bybit - binance) / binance * 100
        bybitFundingRate:
          type: number
          description: Current funding rate on Bybit (8h)
        binanceFundingRate:
          type: number
          description: Current funding rate on Binance (8h)
        bybitNextFunding:
          type: string
          description: Next funding time on Bybit
        binanceNextFunding:
          type: string
          description: Next funding time on Binance
        bybitBid:
          type: number
        bybitAsk:
          type: number
        binanceBid:
          type: number
        binanceAsk:
          type: number
        volume24h:
          type: number
          description: 24h volume in USD (approximate)
        demo:
          type: boolean
          description: True when response contains simulated data due to exchange unavailability
        gatePrice:
          type: number
        gateFundingRate:
          type: number
        gateNextFunding:
          type: string
        gateBid:
          type: number
        gateAsk:
          type: number
        okxPrice:
          type: number
        okxFundingRate:
          type: number
        okxNextFunding:
          type: string
        okxBid:
          type: number
        okxAsk:
          type: number
        mexcPrice:
          type: number
        mexcFundingRate:
          type: number
        mexcNextFunding:
          type: string
        mexcBid:
          type: number
        mexcAsk:
          type: number
        bestSpreadPct:
          type: number
          description: Highest absolute spread across all tracked exchange pairs
        bestSpreadLeg:
          type: string
          description: Label of the exchange pair with the best spread e.g. "gate/binance"
        openInterestUsd:
          type: number
          nullable: true
          description: Total open interest in USD across Bybit and Binance (null if unavailable)
        spreadDepthUsd:
          type: number
          nullable: true
          description: Estimated tradeable depth in USD at the best spread — min(ask depth on cheaper leg, bid depth on expensive leg)
      required:
        - symbol
        - spreadPct

    ExchangeBalances:
      type: object
      properties:
        bybit:
          type: number
          description: USDT balance in Bybit futures wallet
        binance:
          type: number
          description: USDT balance in Binance futures wallet
        bybitPnl:
          type: number
          description: Unrealized P&L on Bybit
        binancePnl:
          type: number
          description: Unrealized P&L on Binance
      required:
        - bybit
        - binance

    OrderRequest:
      type: object
      properties:
        exchange:
          type: string
          enum: [bybit, binance]
        symbol:
          type: string
          description: Token symbol e.g. BTC
        side:
          type: string
          enum: [long, short]
        usdAmount:
          type: number
          description: Order size in USD
        leverage:
          type: number
          description: Leverage multiplier (default 1)
      required:
        - exchange
        - symbol
        - side
        - usdAmount

    OrderResult:
      type: object
      properties:
        orderId:
          type: string
        exchange:
          type: string
        symbol:
          type: string
        side:
          type: string
        filledQty:
          type: number
        avgPrice:
          type: number
        status:
          type: string
      required:
        - orderId
        - exchange
        - symbol
        - side
        - status

    Position:
      type: object
      properties:
        id:
          type: string
        symbol:
          type: string
        bybitSide:
          type: string
          enum: [long, short]
        binanceSide:
          type: string
          enum: [long, short]
        bybitQty:
          type: number
        binanceQty:
          type: number
        bybitEntryPrice:
          type: number
        binanceEntryPrice:
          type: number
        bybitCurrentPrice:
          type: number
        binanceCurrentPrice:
          type: number
        bybitPnl:
          type: number
        binancePnl:
          type: number
        totalPnl:
          type: number
        spreadAtEntry:
          type: number
        currentSpread:
          type: number
        usdSize:
          type: number
        openedAt:
          type: string
      required:
        - id
        - symbol
        - bybitSide
        - binanceSide
        - totalPnl
        - currentSpread

    ClosePositionRequest:
      type: object
      properties:
        positionId:
          type: string
        symbol:
          type: string
        bybitSide:
          type: string
          enum: [long, short]
        binanceSide:
          type: string
          enum: [long, short]
        bybitQty:
          type: number
        binanceQty:
          type: number
        longExchange:
          type: string
          description: Which exchange holds the long leg (for trade recording)
        shortExchange:
          type: string
          description: Which exchange holds the short leg (for trade recording)
        spreadAtEntry:
          type: number
          description: Spread percentage when position was opened
        entryTime:
          type: string
          description: ISO timestamp when position was opened
        quantity:
          type: number
          description: Position size in USD
        realizedPnl:
          type: number
          description: Realized PnL in USD at time of close
      required:
        - positionId
        - symbol
        - bybitQty
        - binanceQty

    ClosePositionResult:
      type: object
      properties:
        success:
          type: boolean
        bybitResult:
          $ref: "#/components/schemas/OrderResult"
        binanceResult:
          $ref: "#/components/schemas/OrderResult"
        realizedPnl:
          type: number
      required:
        - success

    JumpInRequest:
      type: object
      properties:
        symbol:
          type: string
          description: Token symbol e.g. BTC
        bybitSide:
          type: string
          enum: [long, short]
          description: Side for Bybit leg
        binanceSide:
          type: string
          enum: [long, short]
          description: Side for Binance leg (opposite of bybitSide)
        usdAmount:
          type: number
          description: Total USD size split 50/50 across both exchanges
        bybitLeverage:
          type: number
          description: Leverage for Bybit leg
        binanceLeverage:
          type: number
          description: Leverage for Binance leg
      required:
        - symbol
        - bybitSide
        - binanceSide
        - usdAmount

    JumpInResult:
      type: object
      properties:
        success:
          type: boolean
        bybitResult:
          $ref: "#/components/schemas/OrderResult"
        binanceResult:
          $ref: "#/components/schemas/OrderResult"
        compensated:
          type: boolean
          description: True if the first leg was closed due to second leg failure
        error:
          type: string
          description: Error message if success is false
      required:
        - success

    ClosedTrade:
      type: object
      properties:
        id:
          type: number
        symbol:
          type: string
        longExchange:
          type: string
        shortExchange:
          type: string
        spreadAtEntry:
          type: number
        realizedPnl:
          type: number
        quantity:
          type: number
        entryTime:
          type: string
        closeTime:
          type: string
      required:
        - id
        - symbol
        - longExchange
        - shortExchange
        - spreadAtEntry
        - realizedPnl
        - quantity
        - entryTime
        - closeTime

    TradeStats:
      type: object
      properties:
        totalTrades:
          type: number
        winningTrades:
          type: number
        totalPnl:
          type: number
        bestTrade:
          type: number
        worstTrade:
          type: number
      required:
        - totalTrades
        - winningTrades
        - totalPnl
        - bestTrade
        - worstTrade

    TradeHistoryResponse:
      type: object
      properties:
        trades:
          type: array
          items:
            $ref: "#/components/schemas/ClosedTrade"
        stats:
          $ref: "#/components/schemas/TradeStats"
      required:
        - trades
        - stats

    StoreCredentialRequest:
      type: object
      properties:
        exchange:
          type: string
          enum: [bybit, binance]
          description: Exchange identifier
        apiKey:
          type: string
          description: API key for the exchange
        apiSecret:
          type: string
          description: API secret for the exchange
      required:
        - exchange
        - apiKey
        - apiSecret

    StoreCredentialResult:
      type: object
      properties:
        exchange:
          type: string
        stored:
          type: boolean
      required:
        - exchange
        - stored

    CredentialStatus:
      type: object
      properties:
        exchange:
          type: string
        updatedAt:
          type: string
      required:
        - exchange
        - updatedAt

    CredentialStatusResponse:
      type: object
      properties:
        exchanges:
          type: array
          items:
            $ref: "#/components/schemas/CredentialStatus"
      required:
        - exchanges

    BotConfig:
      type: object
      properties:
        id:
          type: number
        symbol:
          type: string
        enabled:
          type: boolean
        enterSpreadPct:
          type: number
          description: Minimum spread % to open a new leg
        closeSpreadPct:
          type: number
          description: Spread % at which open legs are closed
        orderSizeUsd:
          type: number
          description: Total USD size per leg (split 50/50 between exchanges)
        maxOrders:
          type: number
          description: Maximum concurrent open legs (DCA limit)
        forceStopUsd:
          type: number
          description: Close all legs if total PnL drops below this negative value (USD)
        bybitLeverage:
          type: number
        binanceLeverage:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - symbol
        - enabled
        - enterSpreadPct
        - closeSpreadPct
        - orderSizeUsd
        - maxOrders
        - forceStopUsd
        - bybitLeverage
        - binanceLeverage
        - createdAt
        - updatedAt

    BotLeg:
      type: object
      properties:
        id:
          type: number
        botConfigId:
          type: number
        symbol:
          type: string
        bybitOrderId:
          type: string
        binanceOrderId:
          type: string
        bybitQty:
          type: number
        binanceQty:
          type: number
        bybitEntry:
          type: number
        binanceEntry:
          type: number
        bybitSide:
          type: string
          enum: [long, short]
        binanceSide:
          type: string
          enum: [long, short]
        spreadAtEntry:
          type: number
        status:
          type: string
          enum: [open, closed]
        openedAt:
          type: string
        closedAt:
          type: string
      required:
        - id
        - botConfigId
        - symbol
        - bybitSide
        - binanceSide
        - status
        - openedAt

    CreateBotRequest:
      type: object
      properties:
        symbol:
          type: string
          description: Token symbol e.g. BTC
        enterSpreadPct:
          type: number
          description: Minimum spread % to open a new leg
        closeSpreadPct:
          type: number
          description: Spread % at which open legs are closed
        orderSizeUsd:
          type: number
          description: Total USD size per leg
        maxOrders:
          type: number
          description: Maximum concurrent open legs
        forceStopUsd:
          type: number
          description: Force-stop loss threshold in USD
        bybitLeverage:
          type: number
        binanceLeverage:
          type: number
      required:
        - symbol
        - enterSpreadPct
        - closeSpreadPct
        - orderSizeUsd

    UpdateBotRequest:
      type: object
      properties:
        enterSpreadPct:
          type: number
        closeSpreadPct:
          type: number
        orderSizeUsd:
          type: number
        maxOrders:
          type: number
        forceStopUsd:
          type: number
        bybitLeverage:
          type: number
        binanceLeverage:
          type: number

    BotResponse:
      type: object
      properties:
        bot:
          $ref: "#/components/schemas/BotConfig"
      required:
        - bot

    BotListResponse:
      type: object
      properties:
        bots:
          type: array
          items:
            $ref: "#/components/schemas/BotConfig"
      required:
        - bots

    BotLegsResponse:
      type: object
      properties:
        legs:
          type: array
          items:
            $ref: "#/components/schemas/BotLeg"
      required:
        - legs

    DeleteBotResult:
      type: object
      properties:
        deleted:
          type: boolean
      required:
        - deleted

