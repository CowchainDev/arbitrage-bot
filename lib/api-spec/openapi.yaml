openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: exchanges
    description: Exchange data and trading operations
  - name: trades
    description: Trade history operations
  - name: credentials
    description: Server-side credential storage for bot automation
  - name: bots
    description: Automated arbitrage bot configuration and control
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /exchanges/klines:
    get:
      operationId: getExchangeKlines
      tags: [exchanges]
      summary: Get OHLCV candlestick data for a token across all exchanges
      description: Returns close-price candle data (t, c) per exchange. Only exchanges with successful data are included; exchanges that fail or do not list the token are omitted. Returns an empty object when no exchanges respond successfully.
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
          required: true
          description: Token symbol e.g. BTC
        - in: query
          name: interval
          schema:
            type: string
            enum: ["1m", "5m", "15m", "1h", "4h", "1d"]
            default: "1h"
          required: false
          description: Candle interval
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 168
          required: false
          description: Number of candles to return
      responses:
        "200":
          description: Kline data keyed by exchange name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeKlinesResponse"
        "400":
          description: Missing or invalid symbol parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /exchanges/prices:
    get:
      operationId: getExchangePrices
      tags: [exchanges]
      summary: Get price spread data for all tracked tokens
      description: Returns live price data from both Bybit and Binance futures markets with calculated spread
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Price spread data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenSpread"

  /exchanges/balances:
    get:
      operationId: getExchangeBalances
      tags: [exchanges]
      summary: Get futures wallet balances for both exchanges
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: true
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: true
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: true
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Wallet balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeBalances"
        "401":
          description: Invalid API credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /exchanges/order:
    post:
      operationId: placeOrder
      tags: [exchanges]
      summary: Place a futures order on a specific exchange
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "200":
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Invalid API credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /positions:
    get:
      operationId: getPositions
      tags: [exchanges]
      summary: Get all open positions with live P&L
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Open positions with P&L
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /exchanges/jump-in:
    post:
      operationId: jumpIn
      tags: [exchanges]
      summary: Atomically open a long on one exchange and short on the other
      description: Places hedge orders on both exchanges. If the second leg fails, the first is immediately closed as compensation.
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JumpInRequest"
      responses:
        "200":
          description: Both legs placed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JumpInResult"
        "400":
          description: Bad request or partial failure with compensation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JumpInResult"
        "401":
          description: Invalid API credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /exchanges/close-position:
    post:
      operationId: closePosition
      tags: [exchanges]
      summary: Close both sides of an arbitrage position
      parameters:
        - in: header
          name: x-bybit-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-bybit-api-secret
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-key
          schema:
            type: string
          required: false
        - in: header
          name: x-binance-api-secret
          schema:
            type: string
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClosePositionRequest"
      responses:
        "200":
          description: Position closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClosePositionResult"

  /bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List all bot configurations
      responses:
        "200":
          description: Bot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotListResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createBot
      tags: [bots]
      summary: Create a new bot configuration
      parameters:
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotRequest"
      responses:
        "200":
          description: Bot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}:
    put:
      operationId: updateBot
      tags: [bots]
      summary: Update a bot configuration
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotRequest"
      responses:
        "200":
          description: Bot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteBot
      tags: [bots]
      summary: Delete a bot configuration and all its legs
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      responses:
        "200":
          description: Bot deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBotResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/start:
    post:
      operationId: startBot
      tags: [bots]
      summary: Enable a bot (start watching for entry conditions)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/stop:
    post:
      operationId: stopBot
      tags: [bots]
      summary: Disable a bot (stop opening new legs, existing legs still close)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/stop-and-close:
    post:
      operationId: stopAndCloseBot
      tags: [bots]
      summary: Stop a bot and immediately close all its open legs at market price
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-bot-secret
          required: false
          description: Required in production when BOT_SECRET env var is set
          schema:
            type: string
      responses:
        "200":
          description: Bot stopped and positions closed
          content:
            application/json:
              schema:
                type: object
                required: [bot, closed, failed]
                properties:
                  bot:
                    $ref: "#/components/schemas/BotConfig"
                  closed:
                    type: integer
                    description: Number of legs successfully closed
                  failed:
                    type: integer
                    description: Number of legs that failed to close
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/legs:
    get:
      operationId: getBotLegs
      tags: [bots]
      summary: Get all open legs for a bot
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Open legs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotLegsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/stats:
    get:
      operationId: getBotStats
      tags: [bots]
      summary: Get aggregated closed-leg statistics for a bot
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /bots/{id}/leg-history:
    get:
      operationId: getBotLegHistory
      tags: [bots]
      summary: Get per-day closed leg counts and cumulative totals for a bot
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leg history bucketed by day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotLegHistory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /credentials:
    post:
      operationId: storeCredential
      tags: [credentials]
      summary: Store or update API credentials for an exchange server-side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreCredentialRequest"
      responses:
        "200":
          description: Credential stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreCredentialResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      operationId: getCredentialStatus
      tags: [credentials]
      summary: Get which exchanges have credentials stored server-side (no secrets returned)
      responses:
        "200":
          description: Credential status list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialStatusResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /credentials/{exchange}:
    delete:
      operationId: deleteCredential
      tags: [credentials]
      summary: Remove stored API credentials for an exchange
      parameters:
        - name: exchange
          in: path
          required: true
          schema:
            type: string
            enum: [bybit, binance, gate, okx, mexc, aster, hyper]
      responses:
        "200":
          description: Credential deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  exchange:
                    type: string
                  deleted:
                    type: boolean
                required: [exchange, deleted]
        "400":
          description: Unknown exchange
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: Get trade history with aggregate stats
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
          required: false
          description: Filter by trading symbol (e.g. BTC, ETH). Case-insensitive exact match.
        - in: query
          name: dateFrom
          schema:
            type: string
          required: false
          description: Start of date range (ISO 8601). Filters trades closed on or after this date.
        - in: query
          name: dateTo
          schema:
            type: string
          required: false
          description: End of date range (ISO 8601). Filters trades closed on or before this date.
      responses:
        "200":
          description: Trade history and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeHistoryResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trades/symbols:
    get:
      operationId: getTradesSymbols
      tags: [trades]
      summary: Get all distinct trading symbols in the user's trade history
      description: Returns a sorted list of all unique symbols the user has ever traded. Useful for populating symbol filter dropdowns.
      responses:
        "200":
          description: List of distinct symbols
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSymbolsResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /trades/pnl-chart:
    get:
      operationId: getTradesPnlChart
      tags: [trades]
      summary: Get cumulative PnL chart data
      description: Returns cumulative PnL data points for closed trades ordered chronologically. Supports the same symbol and date filters as the trade history endpoint.
      parameters:
        - in: query
          name: symbol
          schema:
            type: string
          required: false
          description: Filter by trading symbol (e.g. BTC, ETH). Case-insensitive exact match.
        - in: query
          name: dateFrom
          schema:
            type: string
          required: false
          description: Start of date range (ISO 8601). Filters trades closed on or after this date.
        - in: query
          name: dateTo
          schema:
            type: string
          required: false
          description: End of date range (ISO 8601). Filters trades closed on or before this date.
      responses:
        "200":
          description: Cumulative PnL chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnlChartResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    TokenSpread:
      type: object
      properties:
        symbol:
          type: string
          description: Token symbol e.g. BTC, ETH
        bybitPrice:
          type: number
          nullable: true
          description: Last price on Bybit futures (null if token not listed)
        binancePrice:
          type: number
          nullable: true
          description: Last price on Binance futures (null if token not listed)
        spreadPct:
          type: number
          description: Price spread percentage (bybit - binance) / binance * 100
        bybitFundingRate:
          type: number
          description: Current funding rate on Bybit (8h)
        binanceFundingRate:
          type: number
          description: Current funding rate on Binance (8h)
        bybitNextFunding:
          type: string
          description: Next funding time on Bybit
        binanceNextFunding:
          type: string
          description: Next funding time on Binance
        bybitBid:
          type: number
        bybitAsk:
          type: number
        binanceBid:
          type: number
        binanceAsk:
          type: number
        volume24h:
          type: number
          description: 24h volume in USD (approximate)
        demo:
          type: boolean
          description: True when response contains simulated data due to exchange unavailability
        gatePrice:
          type: number
        gateFundingRate:
          type: number
        gateNextFunding:
          type: string
        gateBid:
          type: number
        gateAsk:
          type: number
        okxPrice:
          type: number
        okxFundingRate:
          type: number
        okxNextFunding:
          type: string
        okxBid:
          type: number
        okxAsk:
          type: number
        mexcPrice:
          type: number
        mexcFundingRate:
          type: number
        mexcNextFunding:
          type: string
        mexcBid:
          type: number
        mexcAsk:
          type: number
        asterPrice:
          type: number
        asterFundingRate:
          type: number
        asterNextFunding:
          type: string
        asterBid:
          type: number
        asterAsk:
          type: number
        hyperPrice:
          type: number
          nullable: true
        hyperFundingRate:
          type: number
          nullable: true
        hyperNextFunding:
          type: string
          nullable: true
        hyperBid:
          type: number
          nullable: true
        hyperAsk:
          type: number
          nullable: true
        bestSpreadPct:
          type: number
          description: Highest absolute spread across all tracked exchange pairs
        emaSpreadPct:
          type: number
          description: Exponential moving average of bestSpreadPct (α≈0.006, ~10-min half-life at 5s refresh)
        bestSpreadLeg:
          type: string
          description: Label of the exchange pair with the best spread e.g. "gate/binance"
        openInterestUsd:
          type: number
          nullable: true
          description: Total open interest in USD across Bybit and Binance (null if unavailable)
        spreadDepthUsd:
          type: number
          nullable: true
          description: Estimated tradeable depth in USD at the best spread — min(ask depth on cheaper leg, bid depth on expensive leg)
      required:
        - symbol
        - spreadPct

    ExchangeBalances:
      type: object
      properties:
        bybit:
          type: number
          description: USDT balance in Bybit futures wallet
        binance:
          type: number
          description: USDT balance in Binance futures wallet
        bybitPnl:
          type: number
          description: Unrealized P&L on Bybit
        binancePnl:
          type: number
          description: Unrealized P&L on Binance
        okx:
          type: number
        okxPnl:
          type: number
        mexc:
          type: number
        mexcPnl:
          type: number
        hyper:
          type: number
          description: USDC balance in HyperLiquid futures wallet
        hyperPnl:
          type: number
      required:
        - bybit
        - binance

    OrderRequest:
      type: object
      properties:
        exchange:
          type: string
          enum: [bybit, binance, gate, okx, mexc, hyper]
        symbol:
          type: string
          description: Token symbol e.g. BTC
        side:
          type: string
          enum: [long, short]
        usdAmount:
          type: number
          description: Order size in USD
        leverage:
          type: number
          description: Leverage multiplier (default 1)
      required:
        - exchange
        - symbol
        - side
        - usdAmount

    OrderResult:
      type: object
      properties:
        orderId:
          type: string
        exchange:
          type: string
        symbol:
          type: string
        side:
          type: string
        filledQty:
          type: number
        avgPrice:
          type: number
        status:
          type: string
      required:
        - orderId
        - exchange
        - symbol
        - side
        - status

    Position:
      type: object
      properties:
        id:
          type: string
        symbol:
          type: string
        bybitSide:
          type: string
          enum: [long, short]
        binanceSide:
          type: string
          enum: [long, short]
        bybitQty:
          type: number
        binanceQty:
          type: number
        bybitEntryPrice:
          type: number
        binanceEntryPrice:
          type: number
        bybitCurrentPrice:
          type: number
        binanceCurrentPrice:
          type: number
        bybitPnl:
          type: number
        binancePnl:
          type: number
        totalPnl:
          type: number
        openFees:
          type: number
          description: Sum of open fees paid when entering this position (from bot legs, if applicable)
        spreadAtEntry:
          type: number
        currentSpread:
          type: number
        usdSize:
          type: number
        openedAt:
          type: string
      required:
        - id
        - symbol
        - bybitSide
        - binanceSide
        - totalPnl
        - currentSpread

    ClosePositionRequest:
      type: object
      properties:
        positionId:
          type: string
        symbol:
          type: string
        bybitSide:
          type: string
          enum: [long, short]
        binanceSide:
          type: string
          enum: [long, short]
        bybitQty:
          type: number
        binanceQty:
          type: number
        longExchange:
          type: string
          description: Which exchange holds the long leg (for trade recording)
        shortExchange:
          type: string
          description: Which exchange holds the short leg (for trade recording)
        spreadAtEntry:
          type: number
          description: Spread percentage when position was opened
        entryTime:
          type: string
          description: ISO timestamp when position was opened
        quantity:
          type: number
          description: Position size in USD
        realizedPnl:
          type: number
          description: Realized PnL in USD at time of close
      required:
        - positionId
        - symbol
        - bybitQty
        - binanceQty

    ClosePositionResult:
      type: object
      properties:
        success:
          type: boolean
        bybitResult:
          $ref: "#/components/schemas/OrderResult"
        binanceResult:
          $ref: "#/components/schemas/OrderResult"
        realizedPnl:
          type: number
        closeFees:
          type: number
          description: Total fees paid to close the position (sum of both legs)
      required:
        - success

    JumpInRequest:
      type: object
      properties:
        symbol:
          type: string
          description: Token symbol e.g. BTC
        bybitSide:
          type: string
          enum: [long, short]
          description: Side for Bybit leg
        binanceSide:
          type: string
          enum: [long, short]
          description: Side for Binance leg (opposite of bybitSide)
        usdAmount:
          type: number
          description: Total USD size split 50/50 across both exchanges
        bybitLeverage:
          type: number
          description: Leverage for Bybit leg
        binanceLeverage:
          type: number
          description: Leverage for Binance leg
      required:
        - symbol
        - bybitSide
        - binanceSide
        - usdAmount

    JumpInResult:
      type: object
      properties:
        success:
          type: boolean
        bybitResult:
          $ref: "#/components/schemas/OrderResult"
        binanceResult:
          $ref: "#/components/schemas/OrderResult"
        compensated:
          type: boolean
          description: True if the first leg was closed due to second leg failure
        error:
          type: string
          description: Error message if success is false
      required:
        - success

    ClosedTrade:
      type: object
      properties:
        id:
          type: number
        symbol:
          type: string
        longExchange:
          type: string
        shortExchange:
          type: string
        spreadAtEntry:
          type: number
        enterSpreadThresholdPct:
          type: number
          nullable: true
          description: The enterSpreadPct threshold that was active when the trade was opened. Null for historical trades recorded before this field was added.
        realizedPnl:
          type: number
        totalFees:
          type: number
        openFees:
          type: number
          description: Fees paid to open the position (from bot legs)
        closeFees:
          type: number
          description: Fees paid to close the position (totalFees - openFees)
        fundingPaidUsd:
          type: number
          nullable: true
          description: Estimated net funding captured over the life of the trade (positive = received, negative = paid). Null for older trades recorded before this feature.
        fundingRateSpread:
          type: number
          nullable: true
          description: The net funding rate spread (long rate minus short rate) at the time the trade was closed. Positive means long side received more than short side paid. Null for older trades.
        spreadAtExit:
          type: number
          nullable: true
          description: The spread percentage at the time the trade was closed. Null for older trades.
        closeReason:
          type: string
          nullable: true
          description: Why the trade was closed (e.g. take_profit, stop_loss, force_stop, manual). Null for older trades.
        pnlFromExchange:
          type: boolean
          nullable: true
          description: True when realizedPnl was reported directly by the exchange. False when it was calculated locally using the spread formula. Null for older trades recorded before this field was added.
        pnlPartial:
          type: boolean
          nullable: true
          description: True when this figure came from a partial backfill — one exchange returned historical PnL but the other did not (the missing side was treated as zero). Always null/absent for live trades.
        quantity:
          type: number
        entryTime:
          type: string
        closeTime:
          type: string
      required:
        - id
        - symbol
        - longExchange
        - shortExchange
        - spreadAtEntry
        - realizedPnl
        - totalFees
        - quantity
        - entryTime
        - closeTime

    TradeStats:
      type: object
      properties:
        totalTrades:
          type: number
        winningTrades:
          type: number
        totalPnl:
          type: number
        totalFees:
          type: number
        totalOpenFees:
          type: number
          nullable: true
          description: Sum of open-leg fees across all bot trades. Null if no bot trades have fee data.
        totalCloseFees:
          type: number
          nullable: true
          description: Sum of close-leg fees across all bot trades. Null if no bot trades have fee data.
        bestTrade:
          type: number
        worstTrade:
          type: number
        totalFunding:
          type: number
          description: Sum of all fundingPaidUsd values across closed trades. Positive means net funding received.
        netPnl:
          type: number
          description: totalPnl + totalFunding — the true bottom-line performance including funding.
        avgFundingRateSpread:
          type: number
          nullable: true
          description: Average funding rate spread at close across all trades in the result set. Null if no trades have funding rate spread data.
      required:
        - totalTrades
        - winningTrades
        - totalPnl
        - totalFees
        - bestTrade
        - worstTrade
        - totalFunding
        - netPnl

    TradeSymbolsResponse:
      type: object
      properties:
        symbols:
          type: array
          items:
            type: string
          description: Sorted list of all distinct trading symbols in the user's history
      required:
        - symbols

    TradeHistoryResponse:
      type: object
      properties:
        trades:
          type: array
          items:
            $ref: "#/components/schemas/ClosedTrade"
        stats:
          $ref: "#/components/schemas/TradeStats"
      required:
        - trades
        - stats

    PnlChartPoint:
      type: object
      properties:
        closeTime:
          type: string
          description: ISO 8601 timestamp of when the trade closed
        pnl:
          type: number
          description: Realized PnL for this individual trade
        cumPnl:
          type: number
          description: Running cumulative realized PnL up to and including this trade (excl. funding)
        funding:
          type: number
          nullable: true
          description: Funding paid/received for this individual trade (null if unavailable)
        cumNetPnl:
          type: number
          nullable: true
          description: Running cumulative net PnL (realizedPnl + funding) up to and including this trade; null if any preceding trade has no funding data
        fundingRateSpread:
          type: number
          nullable: true
          description: Net funding rate spread (long rate minus short rate) at trade close. Null for older trades.
        symbol:
          type: string
          description: Trading pair symbol
      required:
        - closeTime
        - pnl
        - cumPnl
        - funding
        - cumNetPnl
        - symbol

    PnlChartResponse:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/PnlChartPoint"
      required:
        - points

    StoreCredentialRequest:
      type: object
      properties:
        exchange:
          type: string
          enum: [bybit, binance, gate, okx, mexc, aster, hyper]
          description: Exchange identifier
        apiKey:
          type: string
          description: API key for the exchange
        apiSecret:
          type: string
          description: API secret for the exchange
        passphrase:
          type: string
          description: API passphrase (required for OKX only)
      required:
        - exchange
        - apiKey
        - apiSecret

    StoreCredentialResult:
      type: object
      properties:
        exchange:
          type: string
        stored:
          type: boolean
      required:
        - exchange
        - stored

    CredentialStatus:
      type: object
      properties:
        exchange:
          type: string
        updatedAt:
          type: string
      required:
        - exchange
        - updatedAt

    CredentialStatusResponse:
      type: object
      properties:
        exchanges:
          type: array
          items:
            $ref: "#/components/schemas/CredentialStatus"
      required:
        - exchanges

    BotConfig:
      type: object
      properties:
        id:
          type: number
        symbol:
          type: string
        enabled:
          type: boolean
        enterSpreadPct:
          type: number
          description: Minimum spread % to open a new leg
        closeSpreadPct:
          type: number
          description: Spread % at which open legs are closed (take profit)
        stopLossSpreadPct:
          type: number
          description: Spread % at which a widening position is closed (stop loss, 0 = disabled)
        orderSizeUsd:
          type: number
          description: Total USD size per leg (split 50/50 between exchanges)
        maxOrders:
          type: number
          description: Maximum concurrent open legs (DCA limit)
        forceStopUsd:
          type: number
          description: Close all legs if total PnL drops below this negative value (USD)
        bybitLeverage:
          type: number
        binanceLeverage:
          type: number
        exchangeA:
          type: string
          description: First exchange in the arbitrage pair (e.g. bybit)
        exchangeB:
          type: string
          description: Second exchange in the arbitrage pair (e.g. binance)
        leverageA:
          type: number
          description: Leverage for exchange A
        leverageB:
          type: number
          description: Leverage for exchange B
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - symbol
        - enabled
        - enterSpreadPct
        - closeSpreadPct
        - stopLossSpreadPct
        - orderSizeUsd
        - maxOrders
        - forceStopUsd
        - bybitLeverage
        - binanceLeverage
        - exchangeA
        - exchangeB
        - leverageA
        - leverageB
        - createdAt
        - updatedAt

    BotLeg:
      type: object
